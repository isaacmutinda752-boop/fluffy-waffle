<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Admin Portal</title>
    <link rel="stylesheet" href="adminportal.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      .settings-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        max-width: 800px;
        margin: 20px auto;
      }
      .settings-card {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }
      .settings-card h3 {
        font-size: 1.3rem;
        color: #333;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid #eee;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
      }
      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>SokoDigital Admin</h2>
        </div>
        <ul class="sidebar-nav">
          <li>
            <a href="adminportal.html"
              ><i class="fas fa-tachometer-alt"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="admin_products.html"
              ><i class="fas fa-box-open"></i> Products</a
            >
          </li>
          <li>
            <a href="admin_sellers.html"
              ><i class="fas fa-users"></i> Sellers</a
            >
          </li>
          <li>
            <a href="admin_orders.html"
              ><i class="fas fa-shopping-cart"></i> Orders</a
            >
          </li>
          <li>
            <a href="admin_analytics.html"
              ><i class="fas fa-chart-line"></i> Analytics</a
            >
          </li>
          <li>
            <a href="admin_settings.html" class="active"
              ><i class="fas fa-cog"></i> Settings</a
            >
          </li>
          <li>
            <a href="checkout.html"
              ><i class="fas fa-credit-card"></i> Checkout</a
            >
          </li>
          <li>
            <a href="index.html"><i class="fas fa-globe"></i> View Website</a>
          </li>
        </ul>
        <div class="sidebar-footer">
          <button class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="main-header">
          <div style="display: flex; align-items: center; gap: 15px">
            <button id="sidebar-toggle" class="sidebar-toggle">
              <i class="fas fa-bars"></i>
            </button>
            <h1>Account Settings</h1>
          </div>
        </header>

        <div class="settings-grid">
          <!-- Profile Information Card -->
          <div class="settings-card">
            <h3>Profile Information</h3>
            <form id="profile-form">
              <div class="form-group">
                <label for="admin-name">Full Name</label>
                <input
                  type="text"
                  id="admin-name"
                  value="Isaac Mutinda"
                  required
                />
              </div>
              <div class="form-group">
                <label for="admin-email">Email Address</label>
                <input
                  type="email"
                  id="admin-email"
                  value="isaacmutinda752@gmail.com"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">
                Save Changes
              </button>
            </form>
          </div>

          <!-- Change Password Card -->
          <div class="settings-card">
            <h3>Change Password</h3>
            <form id="password-form">
              <div class="form-group">
                <label for="current-password">Current Password</label>
                <input type="password" id="current-password" required />
              </div>
              <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" required />
              </div>
              <div class="form-group">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" required />
              </div>
              <button type="submit" class="btn btn-primary">
                Update Password
              </button>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script src="admin.js"></script>
  </body>
</html>
